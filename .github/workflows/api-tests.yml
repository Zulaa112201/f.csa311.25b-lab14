name: API Tests — JSONPlaceholder

on: [push, pull_request]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g newman newman-reporter-htmlextra wait-on
          # Хэрэв танд package.json байгаа бол 'npm install' хийхэд хангалттай
          npm install express 

      - name: Start mock server
        run: |
          node server/index.js &
          # Сервер 3000 порт дээр бүрэн асаж хариу өгтөл нь хүлээнэ
          wait-on http://localhost:3000
          echo "Mock server is up and running!"

      - name: Run API tests
        run: |
          mkdir -p reports
          newman run postman/collection.json \
            -e postman/env.ci.json \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export reports/api.xml \
            --reporter-htmlextra-export reports/api.html \
            --reporter-htmlextra-title "F.CSM311 Lab14 — API Test Report" \
            --reporter-htmlextra-darkTheme

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/